<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>杨昊燃 Tools Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../../style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">杨昊燃</div>
            <nav id="nav-list"><a href="#" class="nav-item">仪表盘</a></nav>
        </aside>
        <main class="main-content">
            <header class="header"><h1>Tools Bar Dashboard</h1></header>
            <section class="dashboard-panels">
                <h2 class="md-typescale-title-medium">实时监控面板 (Pinned)</h2>
                <div id="panels-grid" class="panels-grid"></div>
            </section>
            <h2 class="md-typescale-title-medium">全部工具</h2>
            <div id="plugin-grid" class="plugin-grid"></div>
        </main>
    </div>

    <!-- 增强型弹窗 -->
    <div id="tool-dialog" class="dialog-overlay" style="display:none;">
        <div class="dialog-content">
            <h3 id="dialog-title" style="margin-top:0; color:#2563eb;">工具</h3>
            <div id="dialog-body" style="flex:1; overflow-y:auto; display:flex; flex-direction:column;">
                <div id="feature-view" style="flex:1; display:flex; flex-direction:column;"></div>
            </div>
            <button id="close-btn" style="margin-top:15px; padding:12px; background:#e5e7eb; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">关闭面板</button>
        </div>
    </div>
    <script src="app.js" type="module"></script>
</body>
</html>
