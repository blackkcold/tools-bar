<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>汇率对比</title>
    <link rel="stylesheet" href="../../form-theme.css">
    <style>
        body { padding: 20px; background: #fff; }
        .row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f3f4f6; font-size: 16px; }
        .row strong { color: #2563eb; font-size: 18px; }
    </style>

    <style>
        @media (max-width: 600px) {
            body { padding: 10px; }
            .flex-row { flex-direction: column !important; gap: 10px; }
            input, select { width: 100% !important; box-sizing: border-box; }
            h3 { font-size: 1.1rem; }
            .row { font-size: 14px; }
            .cache-controls { flex-direction: column !important; gap: 10px; align-items: stretch !important; text-align: center; }
        }
    </style>
</head>
<body>
    <h3 style="margin-top:0; color:#2563eb;">多国汇率实时换算</h3>
    <div class="flex-row" style="display:flex; gap:10px;">
        <input type="number" id="amount" value="100" oninput="convert()" style="flex:2;">
        <select id="baseCur" onchange="convert()" style="flex:1;">
            <option value="USD">USD 美元</option>
            <option value="CNY" selected>CNY 人民币</option>
            <option value="EUR">EUR 欧元</option>
            <option value="JPY">JPY 日元</option>
            <option value="GBP">GBP 英镑</option>
        </select>
    </div>
    <div class="cache-controls" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
        <span id="cache-time" style="font-size:12px; color:#9ca3af;"></span>
        <button onclick="init(true)" style="background:#2563eb; color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">强制刷新</button>
    </div>

    <div id="results" style="margin-top:20px;">
        <div style="text-align:center; color:#6b7280;">实时数据拉取中...</div>
    </div>

    <script>
        
        let rates = {};
        async function init(forceRefresh = false) {
            document.getElementById('results').innerHTML = '<div style="color:#6b7280;text-align:center;">实时数据拉取中...</div>';
            try {
                let data;
                if (window.parent && window.parent.GlobalDataManager) {
                    data = await window.parent.GlobalDataManager.getCurrency(forceRefresh);
                } else {
                    const res = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
                    data = await res.json();
                }
                rates = data.rates;
                convert();
                
                // Show cache time
                const timeKey = localStorage.getItem('global_time_currency_json');
                const d = timeKey ? new Date(parseInt(timeKey)) : new Date();
                document.getElementById('cache-time').innerText = `更新时间: ${d.toLocaleString('zh-CN')} (每天刷新一次)`;
            } catch (e) {
                console.error(e);
                document.getElementById('results').innerHTML = '<div style="color:red;text-align:center;">汇率API请求失败，请检查网络</div>';
            }
        }

        function convert() {
            if(!rates['USD']) return; // Not loaded yet
            const amt = parseFloat(document.getElementById('amount').value) || 0;
            const base = document.getElementById('baseCur').value;
            // Convert to USD first
            const usdAmt = amt / rates[base];
            
            const targets = ['CNY', 'USD', 'EUR', 'JPY', 'GBP', 'AUD', 'HKD', 'SGD', 'CAD'];
            let html = '';
            targets.forEach(c => {
                if(c !== base) {
                    const val = (usdAmt * rates[c]).toFixed(2);
                    html += `<div class="row"><span>${c}</span><strong>${val}</strong></div>`;
                }
            });
            document.getElementById('results').innerHTML = html;
        }
        init();
    </script>
</body>
</html>
