<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <style>
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; padding: 20px; background-color: #f4f7fa; }
        .calc { width: 300px; padding: 20px; background: #fff; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input { width: 100%; height: 50px; margin-bottom: 15px; font-size: 24px; text-align: right; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 50px; border: none; border-radius: 8px; background: #e0e0e0; font-size: 18px; cursor: pointer; }
        button:hover { background: #d0d0d0; }
        button.op { background: #1a73e8; color: white; }
    </style>
</head>
<body>
<div class="calc">
    <input type="text" id="display" readonly>
    <div class="grid">
        <button onclick="calc.clearDisplay()">C</button><button onclick="calc.appendToDisplay('/')">/</button>
        <button onclick="calc.appendToDisplay('*')">*</button><button onclick="calc.deleteChar()">DEL</button>
        <button onclick="calc.appendToDisplay('7')">7</button><button onclick="calc.appendToDisplay('8')">8</button>
        <button onclick="calc.appendToDisplay('9')">9</button><button onclick="calc.appendToDisplay('-')">-</button>
        <button onclick="calc.appendToDisplay('4')">4</button><button onclick="calc.appendToDisplay('5')">5</button>
        <button onclick="calc.appendToDisplay('6')">6</button><button onclick="calc.appendToDisplay('+')">+</button>
        <button onclick="calc.appendToDisplay('1')">1</button><button onclick="calc.appendToDisplay('2')">2</button>
        <button onclick="calc.appendToDisplay('3')">3</button><button onclick="calc.calculate()" class="op">=</button>
        <button onclick="calc.appendToDisplay('0')" style="grid-column:span 2;">0</button><button onclick="calc.appendToDisplay('.')">.</button>
    </div>
</div>
<script src="./calculator_core.js"></script>
<script>
    window.calc = CalculatorCore.bindCalculator('display');
</script>
</body>
</html>
