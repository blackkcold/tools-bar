<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>股市行情预览 - 实时指数</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .section-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .material-icons {
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }
        .card-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        .badge-up {
            background: #fef2f2;
            color: #dc2626;
        }
        .badge-down {
            background: #f0fdf4;
            color: #16a34a;
        }
        .badge-neutral {
            background: #f3f4f6;
            color: #6b7280;
        }
        .card-price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Inter', monospace;
        }
        .price-up { color: #dc2626; }
        .price-down { color: #16a34a; }
        .price-neutral { color: #6b7280; }
        .card-change {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .change-up { color: #dc2626; }
        .change-down { color: #16a34a; }
        .change-neutral { color: #6b7280; }
        .card-change .arrow {
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 40px;
        }
        .loading .material-icons {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        .refresh-btn .material-icons {
            color: #667eea;
            font-size: 24px;
        }
        .status-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 13px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: #4ade80; }
        .status-dot.offline { background: #f87171; }
        .last-update {
            opacity: 0.8;
        }
    
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header h1 { font-size: 22px; }
            .grid { grid-template-columns: 1fr; gap: 12px; margin-bottom: 20px; }
            .card { padding: 15px; }
            .card-price { font-size: 26px; }
            .status-bar { flex-direction: column; gap: 10px; text-align: center; }
            .refresh-btn { bottom: 15px; right: 15px; width: 48px; height: 48px; }
        }
</style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 股市行情预览</h1>
            <p>实时股票指数与加密货币行情</p>
        </div>

        <div class="status-bar">
            <div>
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">连接中...</span>
            </div>
            <div class="last-update" id="last-update"></div>
        </div>

        <div class="section-title">
            <span class="material-icons">show_chart</span>
            股票指数
        </div>
        <div class="grid" id="stocks-grid">
            <div class="loading">
                <span class="material-icons">sync</span>
                <p>加载中...</p>
            </div>
        </div>

        <div class="section-title">
            <span class="material-icons">currency_bitcoin</span>
            加密货币
        </div>
        <div class="grid" id="crypto-grid">
            <div class="loading">
                <span class="material-icons">sync</span>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshAll(true)" title="刷新数据">
        <span class="material-icons">refresh</span>
    </button>

    <script src="./market_data.js"></script>
    <script>
        function formatPrice(price) {
            if (price === null || price === undefined) return '--';
            return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatChange(change) {
            if (change === null || change === undefined) return '--';
            const sign = change >= 0 ? '+' : '';
            return sign + change.toFixed(2);
        }

        function formatChangePct(pct) {
            if (pct === null || pct === undefined) return '--';
            const sign = pct >= 0 ? '+' : '';
            return sign + pct.toFixed(2) + '%';
        }

        function createCard(name, data, isCrypto = false) {
            const hasData = data && data.price !== null && data.price !== undefined;
            const isUp = hasData ? data.change_pct >= 0 : false;
            const colorClass = hasData ? (isUp ? 'up' : 'down') : 'neutral';
            const arrow = hasData ? (isUp ? '↑' : '↓') : '-';
            const badgeClass = hasData ? (isUp ? 'badge-up' : 'badge-down') : 'badge-neutral';

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-name">${name}</span>
                        <span class="card-badge ${badgeClass}">${hasData ? (isUp ? '涨' : '跌') : '暂无'}</span>
                    </div>
                    <div class="card-price price-${colorClass}">
                        ${isCrypto && hasData ? '$' : ''}${formatPrice(hasData ? data.price : null)}
                    </div>
                    <div class="card-change">
                        <span class="arrow">${arrow}</span>
                        <span class="change-${colorClass}">${formatChange(hasData ? data.change : null)}</span>
                        <span class="change-${colorClass}">(${formatChangePct(hasData ? data.change_pct : null)})</span>
                    </div>
                </div>
            `;
        }

        
        
        async function fetchStocksAndCrypto(forceRefresh = false) {
            try {
                if (window.parent && window.parent.GlobalDataManager) {
                    return await window.parent.GlobalDataManager.getStocks(forceRefresh);
                }
                if (!window.StockMarketData || !window.StockMarketData.fetchStocksAndCrypto) {
                    throw new Error('StockMarketData helper missing');
                }
                return await window.StockMarketData.fetchStocksAndCrypto();
            } catch (e) {
                console.error(e);
                return null;
            }
        }


        async function refreshAll(forceRefresh = false) {
            const stocksGrid = document.getElementById('stocks-grid');
            const cryptoGrid = document.getElementById('crypto-grid');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const lastUpdate = document.getElementById('last-update');

            statusText.textContent = '刷新中...';
            stocksGrid.innerHTML = '<div class="loading"><span class="material-icons">sync</span><p>加载中...</p></div>';
            cryptoGrid.innerHTML = '<div class="loading"><span class="material-icons">sync</span><p>加载中...</p></div>';

            let data = await fetchStocksAndCrypto(forceRefresh);
            if (!data && window.parent && window.parent.GlobalDataManager) {
                 // Try one more time forcing refresh if empty
                 data = await window.parent.GlobalDataManager.getStocks(true);
            }

            if (data && data.stocks && Object.keys(data.stocks).length > 0) {
                stocksGrid.innerHTML = Object.entries(data.stocks).map(([key, item]) => 
                    createCard(item.name, item)
                ).join('');
                statusDot.classList.add('online');
                statusDot.classList.remove('offline');
                statusText.textContent = '数据已同步 (每天更新一次)';
            } else {
                stocksGrid.innerHTML = '<div class="loading"><p style="color:#f87171;">数据获取失败</p></div>';
                statusDot.classList.add('offline');
                statusDot.classList.remove('online');
                statusText.textContent = '连接异常';
            }

            if (data && data.crypto && Object.keys(data.crypto).length > 0) {
                cryptoGrid.innerHTML = Object.entries(data.crypto).map(([key, item]) => 
                    createCard(item.name, item, true)
                ).join('');
            } else {
                cryptoGrid.innerHTML = '<div class="loading"><p style="color:#f87171;">数据获取失败</p></div>';
            }

            const timeKey = localStorage.getItem('global_time_stocks_json');
            const d = timeKey ? new Date(parseInt(timeKey)) : new Date();
            lastUpdate.textContent = `缓存时间: ${d.toLocaleString('zh-CN')}`;
        }
document.addEventListener('DOMContentLoaded', refreshAll);
    </script>
</body>
</html>
