<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Open Tools Bar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="mobile-menu-btn" style="display:none; cursor:pointer;"><span class="material-icons">menu</span></div>
            <div class="logo">Open Tools Bar</div>
            <nav id="nav-list"><a href="#" class="nav-item" style="color:#2563eb;font-weight:600;text-decoration:none;">工具仪表盘</a></nav>
        </aside>
        <main class="main-content">
            <header class="header"><h1>Tools Bar Dashboard</h1></header>
            <section class="dashboard-panels">
                <h2 class="md-typescale-title-medium" style="margin-bottom:15px;">实时监控面板 (Pinned)</h2>
                <div id="panels-grid" class="panels-grid"></div>
            </section>
            <h2 class="md-typescale-title-medium" style="margin-bottom:15px;margin-top:30px;">全部工具</h2>
            <div id="plugin-grid" class="plugin-grid"></div>
        </main>
    </div>

    <!-- 增强型沉浸弹窗 -->
    <div id="tool-dialog" class="dialog-overlay" style="display:none;">
        <div class="dialog-content">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="dialog-title" style="margin:0; color:#2563eb; font-size:24px;">工具</h3>
                <button id="close-btn" style="background:#f3f4f6; color:#4b5563; border:none; border-radius:50%; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:0.2s;">
                    <span class="material-icons">close</span>
                </button>
            </div>
            <div id="dialog-body" style="flex:1; display:flex; flex-direction:column;">
                <div id="feature-view" style="flex:1; display:flex; flex-direction:column; border-radius:12px; overflow:hidden;"></div>
            </div>
        </div>
    </div>
    <script src="tools/calculator/calculator_core.js"></script>
    <script src="tools/stocks/market_data.js"></script>
    <script src="app.js" type="module"></script>
</body>
</html>
