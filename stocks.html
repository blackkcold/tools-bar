<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股市行情预览 - 实时指数</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .header p {
            font-size: 14px;
            opacity: 0.9;
        }
        .section-title {
            color: white;
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title .material-icons {
            font-size: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 30px;
        }
        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.15);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-name {
            font-size: 14px;
            font-weight: 600;
            color: #374151;
        }
        .card-badge {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
        }
        .badge-up {
            background: #fef2f2;
            color: #dc2626;
        }
        .badge-down {
            background: #f0fdf4;
            color: #16a34a;
        }
        .card-price {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            font-family: 'Inter', monospace;
        }
        .price-up { color: #dc2626; }
        .price-down { color: #16a34a; }
        .card-change {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            font-weight: 500;
        }
        .change-up { color: #dc2626; }
        .change-down { color: #16a34a; }
        .card-change .arrow {
            font-size: 16px;
        }
        .loading {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 40px;
        }
        .loading .material-icons {
            font-size: 48px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            100% { transform: rotate(360deg); }
        }
        .refresh-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border: none;
            border-radius: 50%;
            width: 56px;
            height: 56px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }
        .refresh-btn:hover {
            transform: scale(1.1);
        }
        .refresh-btn .material-icons {
            color: #667eea;
            font-size: 24px;
        }
        .status-bar {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 10px 16px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: white;
            font-size: 13px;
        }
        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 6px;
        }
        .status-dot.online { background: #4ade80; }
        .status-dot.offline { background: #f87171; }
        .last-update {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 股市行情预览</h1>
            <p>实时股票指数与加密货币行情</p>
        </div>

        <div class="status-bar">
            <div>
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">连接中...</span>
            </div>
            <div class="last-update" id="last-update"></div>
        </div>

        <div class="section-title">
            <span class="material-icons">show_chart</span>
            股票指数
        </div>
        <div class="grid" id="stocks-grid">
            <div class="loading">
                <span class="material-icons">sync</span>
                <p>加载中...</p>
            </div>
        </div>

        <div class="section-title">
            <span class="material-icons">currency_bitcoin</span>
            加密货币
        </div>
        <div class="grid" id="crypto-grid">
            <div class="loading">
                <span class="material-icons">sync</span>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <button class="refresh-btn" onclick="refreshAll()" title="刷新数据">
        <span class="material-icons">refresh</span>
    </button>

    <script>
        function formatPrice(price) {
            if (price === null || price === undefined) return '--';
            return price.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatChange(change) {
            if (change === null || change === undefined) return '--';
            const sign = change >= 0 ? '+' : '';
            return sign + change.toFixed(2);
        }

        function formatChangePct(pct) {
            if (pct === null || pct === undefined) return '--';
            const sign = pct >= 0 ? '+' : '';
            return sign + pct.toFixed(2) + '%';
        }

        function createCard(name, data, isCrypto = false) {
            const isUp = data.change_pct >= 0;
            const colorClass = isUp ? 'up' : 'down';
            const arrow = isUp ? '↑' : '↓';
            const badgeClass = isUp ? 'badge-up' : 'badge-down';

            return `
                <div class="card">
                    <div class="card-header">
                        <span class="card-name">${name}</span>
                        <span class="card-badge ${badgeClass}">${isUp ? '涨' : '跌'}</span>
                    </div>
                    <div class="card-price price-${colorClass}">
                        ${isCrypto ? '$' : ''}${formatPrice(data.price)}${!isCrypto ? '' : ''}
                    </div>
                    <div class="card-change">
                        <span class="arrow">${arrow}</span>
                        <span class="change-${colorClass}">${formatChange(data.change)}</span>
                        <span class="change-${colorClass}">(${formatChangePct(data.change_pct)})</span>
                    </div>
                </div>
            `;
        }

        async function fetchStocks() {
            try {
                // 使用腾讯免费股票接口 (支持 CORS, 无需后端)
                const response = await fetch("https://qt.gtimg.cn/q=s_sh000001,s_sz399001,s_sz399006,s_sh000300,s_us.NDX,s_us.INX,s_us.DJI,s_hkHSI");
                const text = await response.text();
                const stocks = {};
                
                const parseLine = (line, code, name) => {
                    const regex = new RegExp(`v_s_${code.replace('.', '\\.')}=".*?~.*?~.*?~(.*?)~(.*?)~(.*?)~`);
                    const match = line.match(regex);
                    if (match) {
                        stocks[code] = {
                            name: name,
                            price: parseFloat(match[1]),
                            change: parseFloat(match[2]),
                            change_pct: parseFloat(match[3])
                        };
                    }
                };

                const lines = text.split(';');
                lines.forEach(line => {
                    parseLine(line, 'sh000001', '上证指数');
                    parseLine(line, 'sz399001', '深证成指');
                    parseLine(line, 'sz399006', '创业板指');
                    parseLine(line, 'sh000300', '沪深300');
                    parseLine(line, 'us.NDX', '纳斯达克100');
                    parseLine(line, 'us.INX', '标普500');
                    parseLine(line, 'us.DJI', '道琼斯');
                    parseLine(line, 'hkHSI', '恒生指数');
                });
                return Object.keys(stocks).length > 0 ? stocks : null;
            } catch (error) {
                console.error('Failed to fetch stocks:', error);
                return null;
            }
        }

        async function fetchCrypto() {
            try {
                // 使用 Binance 免费公开接口 (支持 CORS, 无需后端)
                const response = await fetch('https://data-api.binance.vision/api/v3/ticker/24hr?symbols=%5B%22BTCUSDT%22,%22ETHUSDT%22,%22SOLUSDT%22,%22DOGEUSDT%22%5D');
                const data = await response.json();
                const crypto = {};
                
                data.forEach(item => {
                    let name = item.symbol.replace('USDT', '');
                    crypto[item.symbol] = {
                        name: name,
                        price: parseFloat(item.lastPrice),
                        change: parseFloat(item.priceChange),
                        change_pct: parseFloat(item.priceChangePercent)
                    };
                });
                return Object.keys(crypto).length > 0 ? crypto : null;
            } catch (error) {
                console.error('Failed to fetch crypto:', error);
                return null;
            }
        }

        async function refreshAll() {
            const stocksGrid = document.getElementById('stocks-grid');
            const cryptoGrid = document.getElementById('crypto-grid');
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');
            const lastUpdate = document.getElementById('last-update');

            statusText.textContent = '刷新中...';
            stocksGrid.innerHTML = '<div class="loading"><span class="material-icons">sync</span><p>加载中...</p></div>';
            cryptoGrid.innerHTML = '<div class="loading"><span class="material-icons">sync</span><p>加载中...</p></div>';

            const [stocks, crypto] = await Promise.all([fetchStocks(), fetchCrypto()]);

            if (stocks) {
                stocksGrid.innerHTML = Object.entries(stocks).map(([key, data]) => 
                    createCard(data.name, data)
                ).join('');
                statusDot.classList.add('online');
                statusDot.classList.remove('offline');
                statusText.textContent = '数据正常';
            } else {
                stocksGrid.innerHTML = '<div class="loading"><p style="color:#f87171;">数据获取失败</p></div>';
                statusDot.classList.add('offline');
                statusDot.classList.remove('online');
                statusText.textContent = '连接异常';
            }

            if (crypto) {
                cryptoGrid.innerHTML = Object.entries(crypto).map(([key, data]) => 
                    createCard(data.name, data, true)
                ).join('');
            } else {
                cryptoGrid.innerHTML = '<div class="loading"><p style="color:#f87171;">数据获取失败</p></div>';
            }

            lastUpdate.textContent = `最后更新: ${new Date().toLocaleTimeString()}`;
        }

        document.addEventListener('DOMContentLoaded', refreshAll);
    </script>
</body>
</html>
